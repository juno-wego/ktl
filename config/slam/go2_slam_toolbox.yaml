slam_toolbox:
  ros__parameters:
    # SLAM 최적화에 사용할 solver 플러그인입니다.
    # 다른 solver로 바꾸면 최적화 속도와 수렴 특성이 달라집니다.
    solver_plugin: solver_plugins::CeresSolver

    # Ceres가 선형 방정식을 푸는 방법입니다.
    # 환경 크기와 센서 데이터에 따라 계산 속도와 메모리 사용량이 달라집니다.
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY

    # 선형 solver의 전처리 방법입니다.
    # 바꾸면 최적화 수렴성과 계산량에 영향을 줄 수 있습니다.
    ceres_preconditioner: SCHUR_JACOBI

    # 최적화 탐색 전략입니다.
    # LEVENBERG_MARQUARDT는 일반적인 실내 SLAM에서 안정적인 편입니다.
    ceres_trust_strategy: LEVENBERG_MARQUARDT

    # 최적화 과정에서 사용할 dogleg 탐색 방식입니다.
    # 변경하면 수렴 속도와 지역 최적점 탈출 특성이 달라집니다.
    ceres_dogleg_type: TRADITIONAL_DOGLEG

    # 잔차에 적용할 손실 함수입니다.
    # None은 이상치도 그대로 반영하며, 강건한 함수는 이상치 영향을 줄입니다.
    ceres_loss_function: None

    # 로봇 위치 추정에 사용할 주행 거리 프레임입니다.
    # TF에 존재하는 odom 프레임 이름과 반드시 일치해야 합니다.
    odom_frame: odom

    # 생성할 지도 프레임입니다.
    # Nav2와 RViz의 전역 기준 프레임과 일치해야 합니다.
    map_frame: map

    # LaserScan이 측정되는 로봇 기준 프레임입니다.
    # 현재 LaserScan 변환 기준인 base_link와 일치시킵니다.
    base_frame: base_link

    # SLAM Toolbox가 구독할 LaserScan 토픽입니다.
    # 런치에서 생성하는 최종 토픽 /scan과 일치해야 합니다.
    scan_topic: /scan

    # SLAM 동작 모드입니다.
    # mapping은 새 지도를 만들고 localization은 기존 지도를 사용합니다.
    mode: mapping

    # pose graph를 지도 파일로 저장하는 기능을 활성화합니다.
    # false이면 serialize_map 같은 지도 저장 기능을 사용할 수 없습니다.
    use_map_saver: true

    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # 상세 디버그 로그 출력 여부입니다.
    # true로 바꾸면 문제 분석에 도움이 되지만 로그가 크게 증가합니다.
    debug_logging: false

    # 몇 개의 LaserScan 중 하나를 처리할지 결정합니다.
    # 값을 키우면 계산량은 줄지만 지도 갱신이 성기게 됩니다.
    throttle_scans: 1

    # SLAM Toolbox가 map->odom TF를 발행하는 주기(초)입니다.
    # 값을 줄이면 TF가 더 자주 갱신되지만 CPU 사용량이 증가합니다.
    transform_publish_period: 0.02

    # 지도 갱신 사이의 최소 시간(초)입니다.
    # 값을 줄이면 지도가 빠르게 갱신되고, 값을 키우면 계산량이 줄어듭니다.
    map_update_interval: 2.0

    # 생성되는 Occupancy Grid의 해상도(m/cell)입니다.
    # 값을 작게 하면 세밀해지지만 메모리와 계산량이 증가합니다.
    resolution: 0.05

    # SLAM에 사용할 LaserScan 최소 거리(m)입니다.
    # 센서 근처의 불안정한 포인트를 제외하려면 값을 키웁니다.
    min_laser_range: 0.1

    # SLAM에 사용할 LaserScan 최대 거리(m)입니다.
    # 값을 줄이면 먼 거리의 오검출을 줄이고 계산량을 낮출 수 있습니다.
    max_laser_range: 20.0

    # LaserScan 처리 사이의 최소 시간(초)입니다.
    # 값을 키우면 처리 빈도와 CPU 사용량이 줄어듭니다.
    minimum_time_interval: 0.2

    # TF를 기다릴 최대 시간(초)입니다.
    # 값을 키우면 TF 지연에 강해지지만 오래된 스캔 처리가 늦어질 수 있습니다.
    transform_timeout: 0.3

    # TF 버퍼에 보관할 시간(초)입니다.
    # 값을 키우면 과거 스캔 처리에 유리하지만 메모리 사용량이 증가합니다.
    tf_buffer_duration: 30.0

    # SLAM Toolbox 스레드에 사용할 스택 크기(byte)입니다.
    # 복잡한 지도에서 부족하면 충돌할 수 있지만 과도하게 키우면 메모리를 낭비합니다.
    stack_size_to_use: 40000000

    # 대화형 모드 사용 여부입니다.
    # true이면 pose graph 관련 대화형 기능을 사용할 수 있습니다.
    enable_interactive_mode: true

    # Scan matching을 사용할지 결정합니다.
    # false이면 LaserScan 정합을 사용하지 않아 위치 추정 정확도가 떨어질 수 있습니다.
    use_scan_matching: true

    # 스캔 중심점을 이용한 보정 여부입니다.
    # true이면 대칭적인 환경에서 정합 안정성이 좋아질 수 있습니다.
    use_scan_barycenter: true

    # 새 스캔을 처리하기 위한 최소 이동 거리(m)입니다.
    # 값을 키우면 작은 움직임을 무시해 계산량이 줄어듭니다.
    minimum_travel_distance: 0.15

    # 새 스캔을 처리하기 위한 최소 회전량(rad)입니다.
    # 값을 키우면 작은 회전을 무시하지만 지도 갱신이 늦어집니다.
    minimum_travel_heading: 0.15

    # 최근 스캔을 저장할 개수입니다.
    # 값을 키우면 정합 정보가 늘지만 메모리와 계산량이 증가합니다.
    scan_buffer_size: 10

    # 스캔 버퍼에서 허용할 최대 거리(m)입니다.
    # 값을 줄이면 오래되거나 멀리 떨어진 스캔의 정합 사용을 제한합니다.
    scan_buffer_maximum_scan_distance: 12.0

    # Fine 정합 결과를 인정할 최소 응답값입니다.
    # 값을 높이면 오정합은 줄지만 정상적인 정합도 거부될 수 있습니다.
    link_match_minimum_response_fine: 0.1

    # 한 링크 스캔 정합에서 허용할 최대 거리(m)입니다.
    # 값을 줄이면 큰 위치 점프를 거부하고, 키우면 큰 이동도 정합을 시도합니다.
    link_scan_maximum_distance: 1.5

    # Loop closure 후보를 탐색할 최대 거리(m)입니다.
    # 값을 키우면 더 먼 과거 위치도 비교하지만 계산량이 증가합니다.
    loop_search_maximum_distance: 3.0

    # 과거 장소와의 loop closure를 활성화합니다.
    # true이면 누적 오차를 줄이고, false이면 현재 지역만 연결합니다.
    do_loop_closing: true

    # Loop closure 후보에 필요한 최소 링크 수입니다.
    # 값을 키우면 확실한 루프만 사용하지만 루프 검출이 어려워집니다.
    loop_match_minimum_chain_size: 10

    # Coarse loop 정합의 최대 허용 분산입니다.
    # 값을 낮추면 엄격해지고, 높이면 더 많은 후보를 허용합니다.
    loop_match_maximum_variance_coarse: 3.0

    # Coarse loop 정합을 인정할 최소 응답값입니다.
    # 값을 높이면 오검출은 줄지만 loop closure가 줄어듭니다.
    loop_match_minimum_response_coarse: 0.35

    # Fine loop 정합을 인정할 최소 응답값입니다.
    # 값을 높이면 최종 루프 연결의 신뢰도는 높아지지만 검출이 어려워집니다.
    loop_match_minimum_response_fine: 0.45

    # 일반 정합을 탐색할 공간의 한 변 길이(m)입니다.
    # 값을 키우면 큰 위치 오차를 찾지만 계산량이 증가합니다.
    correlation_search_space_dimension: 0.5

    # 일반 정합 탐색의 위치 해상도(m)입니다.
    # 값을 작게 하면 정밀해지지만 계산량과 메모리 사용량이 늘어납니다.
    correlation_search_space_resolution: 0.01

    # 일반 정합 탐색 결과를 퍼뜨리는 정도입니다.
    # 값을 키우면 탐색이 부드러워지지만 위치 정밀도가 낮아질 수 있습니다.
    correlation_search_space_smear_deviation: 0.1

    # Loop closure를 탐색할 공간의 한 변 길이(m)입니다.
    # 값을 키우면 큰 누적 오차도 찾지만 계산량이 증가합니다.
    loop_search_space_dimension: 8.0

    # Loop closure 탐색의 위치 해상도(m)입니다.
    # 값을 작게 하면 루프 위치가 정밀해지지만 처리 시간이 늘어납니다.
    loop_search_space_resolution: 0.05

    # Loop closure 탐색 결과를 퍼뜨리는 정도입니다.
    # 값을 키우면 탐색이 안정적일 수 있지만 위치가 덜 정밀해집니다.
    loop_search_space_smear_deviation: 0.03

    # 거리 오차에 적용할 가중치입니다.
    # 값을 키우면 거리 일치를 더 중요하게 보고, 낮추면 각도 영향이 상대적으로 커집니다.
    distance_variance_penalty: 0.5

    # 각도 오차에 적용할 가중치입니다.
    # 값을 키우면 방향 일치를 더 중요하게 보고, 낮추면 거리 영향이 상대적으로 커집니다.
    angle_variance_penalty: 1.0

    # Fine 탐색의 각도 시작 오프셋(rad)입니다.
    # 값을 조정하면 정밀 각도 탐색 범위의 중심을 바꿀 수 있습니다.
    fine_search_angle_offset: 0.00349

    # Coarse 탐색의 각도 시작 오프셋(rad)입니다.
    # 값을 키우면 초기 각도 후보 범위가 넓어질 수 있지만 계산량이 증가합니다.
    coarse_search_angle_offset: 0.349

    # Coarse 각도 탐색 간격(rad)입니다.
    # 값을 작게 하면 각도 정밀도는 높아지지만 탐색 시간이 늘어납니다.
    coarse_angle_resolution: 0.0349

    # 최소 각도 오차에 적용할 penalty입니다.
    # 값을 키우면 각도 오차가 큰 정합을 더 강하게 거부합니다.
    minimum_angle_penalty: 0.9

    # 최소 거리 오차에 적용할 penalty입니다.
    # 값을 키우면 거리 오차가 큰 정합을 더 강하게 거부합니다.
    minimum_distance_penalty: 0.5

    # 응답값 확장 기능을 활성화합니다.
    # true이면 약한 정합 후보를 확장 탐색해 정합 성공률을 높일 수 있습니다.
    use_response_expansion: true

    # 정합 통과에 필요한 최소 통과 횟수입니다.
    # 값을 키우면 정합 판정이 엄격해지고, 낮추면 더 많은 후보를 허용합니다.
    min_pass_through: 2

    # 점유 셀로 판정할 확률 임계값입니다.
    # 값을 낮추면 더 많은 셀을 장애물로 보고, 높추면 확실한 점유만 사용합니다.
    occupancy_threshold: 0.1

amcl:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # 회전 운동에서 발생하는 회전 오차 계수입니다.
    # 값을 키우면 회전 중 오도메트리를 덜 신뢰하고 입자 분산이 커집니다.
    alpha1: 0.1

    # 이동 중 발생하는 회전 오차 계수입니다.
    # 직진할 때 heading이 흔들리면 조금씩 키워 오도메트리 불확실성을 반영합니다.
    alpha2: 0.02

    # 이동 중 발생하는 위치 오차 계수입니다.
    # 주행할수록 위치가 밀리면 키우고, 위치가 튀면 줄입니다.
    alpha3: 0.1

    # 회전으로 발생하는 위치 오차 계수입니다.
    # 회전 후 위치가 옆으로 밀리면 키웁니다.
    alpha4: 0.02

    # Omni 이동에서 추가로 반영할 위치 오차 계수입니다.
    # 횡이동이 많은 경우에만 조금씩 키우고, 평소에는 낮게 유지합니다.
    alpha5: 0.02

    # 로봇의 기준 프레임 이름입니다.
    # TF에 존재하는 base_link와 일치해야 위치 추정이 정상 동작합니다.
    base_frame_id: base_link

    # 지도와 측정이 이 거리 이상 어긋난 빔을 skip 후보로 봅니다.
    # 값을 키우면 먼 거리의 불일치만 무시합니다.
    beam_skip_distance: 1.0

    # 빔 skip을 중단할 전체 오차 비율입니다.
    # 값을 낮추면 조금만 불일치해도 빔 skip을 사용하지 않습니다.
    beam_skip_error_threshold: 0.9

    # 빔 skip을 적용할 최소 불일치 비율입니다.
    # 값을 낮추면 일부 동적 장애물이 있어도 정합을 계속 유지할 수 있습니다.
    beam_skip_threshold: 0.5

    # 동적 장애물이나 가려진 빔을 정합에서 제외할지 결정합니다.
    # Hesai scan에 사람·다리·노이즈가 섞일 때 위치 튐을 줄이는 데 도움이 됩니다.
    do_beamskip: true

    # 지도 전역 프레임 이름입니다.
    # 사용하는 Occupancy Grid의 frame과 map으로 일치해야 합니다.
    global_frame_id: map

    # 짧게 측정된 거리의 likelihood 감쇠 계수입니다.
    # 값을 키우면 예상보다 짧은 측정값을 더 강하게 불리하게 평가합니다.
    lambda_short: 0.1

    # LaserScan likelihood 계산에 사용할 최대 거리(m)입니다.
    # 값을 줄이면 먼 거리 측정값의 영향이 감소합니다.
    laser_likelihood_max_dist: 2.0

    # AMCL이 사용할 LaserScan 최대 거리(m)입니다.
    # 값을 줄이면 먼 포인트를 무시해 계산량과 오검출을 줄일 수 있습니다.
    laser_max_range: 20.0

    # AMCL이 사용할 LaserScan 최소 거리(m)입니다.
    # 값을 키우면 센서 바로 앞의 불안정한 측정값을 제외합니다.
    laser_min_range: 0.1

    # LaserScan 확률 모델입니다.
    # likelihood_field_prob는 빔 skip과 함께 잘못된 측정의 영향을 완화합니다.
    laser_model_type: likelihood_field_prob

    # 사용할 최대 LaserScan 빔 수입니다.
    # 값을 키우면 정합 정보가 늘지만 AMCL CPU 사용량도 증가합니다.
    max_beams: 100

    # AMCL 입자의 최대 개수입니다.
    # 값을 키우면 모호한 환경에서 안정성이 좋아지지만 계산량이 늘어납니다.
    max_particles: 2000

    # AMCL 입자의 최소 개수입니다.
    # 값을 키우면 위치 후보를 충분히 유지하지만 평상시 계산량이 증가합니다.
    min_particles: 500

    # 오도메트리 프레임 이름입니다.
    # TF의 odom 프레임과 일치해야 AMCL이 주행 변화를 반영합니다.
    odom_frame_id: odom

    # 입자 재표본화의 오차 허용값입니다.
    # 값을 낮추면 더 정확하지만 입자 수가 빠르게 늘어날 수 있습니다.
    pf_err: 0.05

    # 입자 재표본화의 신뢰 확률입니다.
    # 값을 높이면 더 보수적으로 충분한 입자를 유지합니다.
    pf_z: 0.99

    # 빠른 위치 변화에 대한 recovery 가중치입니다.
    # 값을 키우면 센서 불일치 시 전역 재초기화 성향이 강해집니다.
    recovery_alpha_fast: 0.0

    # 느린 위치 변화에 대한 recovery 가중치입니다.
    # 값을 키우면 장시간 위치를 잃었을 때 전역 복구가 더 적극적입니다.
    recovery_alpha_slow: 0.0

    # 입자 재표본화를 수행할 주기입니다.
    # 값을 키우면 재표본화 빈도가 줄어들고 계산량이 감소합니다.
    resample_interval: 1

    # 사용할 로봇 운동 모델입니다.
    # OmniMotionModel은 Go2의 x, y, yaw 이동을 모두 허용합니다.
    robot_model_type: nav2_amcl::OmniMotionModel

    # AMCL pose를 저장하는 주기(초)입니다.
    # 값을 줄이면 복구용 pose가 더 자주 저장됩니다.
    save_pose_rate: 0.5

    # 지도와 일치하는 측정값의 거리 표준편차(m)입니다.
    # Hesai 2D 투영 오차를 고려해 너무 엄격하지 않게 둡니다.
    sigma_hit: 0.45

    # AMCL이 map->odom TF를 발행할지 결정합니다.
    # true여야 Nav2가 지도 기준 위치를 사용할 수 있습니다.
    tf_broadcast: true

    # map -> odom TF를 현재 시각보다 앞서 유효한 것으로 발행하는 시간(초)입니다.
    # AMCL scan 처리 지연으로 controller가 오래된 TF를 받지 않도록 0.8초를 둡니다.
    transform_tolerance: 0.8

    # AMCL 갱신을 수행할 최소 회전량(rad)입니다.
    # 값을 낮추면 회전 중 scan 보정이 더 자주 수행됩니다.
    update_min_a: 0.10

    # 목표 이동량으로 인정할 최소 거리(m)입니다.
    # 값을 키우면 작은 이동을 무시해 불필요한 갱신을 줄입니다.
    update_min_d: 0.10

    # 지도와 일치하는 정상 측정값의 likelihood 가중치입니다.
    # 값을 키우면 정적 벽과 잘 맞는 scan을 더 강하게 신뢰합니다.
    z_hit: 0.5

    # 최대 거리로 측정된 빔의 likelihood 가중치입니다.
    # 낮게 유지해 빈 빔이 위치 보정을 과도하게 좌우하지 않게 합니다.
    z_max: 0.03

    # 무작위 측정값의 likelihood 가중치입니다.
    # 값을 키우면 노이즈를 더 허용하지만 정합이 둔해질 수 있습니다.
    z_rand: 0.4

    # 예상보다 짧은 측정값의 likelihood 가중치입니다.
    # 동적 장애물이나 가림으로 가까운 hit가 생기는 상황을 일부 허용합니다.
    z_short: 0.07

    # AMCL이 구독할 LaserScan 토픽입니다.
    # LaserScan 변환 결과인 /scan과 일치해야 합니다.
    scan_topic: /scan

    # 시작 pose를 파라미터로 사용할지 결정합니다.
    # true로 바꾸면 initial_pose_* 값과 함께 초기 위치를 지정할 수 있습니다.
    set_initial_pose: false

bt_navigator:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # Nav2 전역 기준 프레임입니다.
    # 지도와 AMCL의 global_frame_id와 map으로 일치해야 합니다.
    global_frame: map

    # Nav2가 사용할 로봇 기준 프레임입니다.
    # TF의 base_link와 일치해야 경로와 로봇 위치가 맞습니다.
    robot_base_frame: base_link

    # BT Navigator가 사용할 오도메트리 토픽입니다.
    # Go2 상태 브리지의 /go2/odom과 연결됩니다.
    odom_topic: /go2/odom

    # BT를 반복 실행하는 주기(ms)입니다.
    # 값을 키우면 반응이 느려지고, 줄이면 CPU 사용량이 늘어납니다.
    bt_loop_duration: 10

    # BT 서버 응답을 기다릴 최대 시간(ms)입니다.
    # 값을 키우면 느린 서버를 허용하지만 실패 감지가 늦어집니다.
    default_server_timeout: 20

    # 기본 NavigateToPose BT를 사용합니다. Nav2가 설치된 배포판에 맞는 기본
    # recovery BT가 선택되므로, controller가 한 번 실패해도 즉시 ABORTED로 끝내지
    # 않고 costmap clear, 재계획, Spin/Wait/BackUp recovery를 시도합니다.
    # distro 경로를 하드코딩하지 않는 것이 Humble/Jazzy 모두에서 안전합니다.

    # BT에서 사용할 플러그인 라이브러리 목록입니다.
    # 항목을 추가하면 해당 조건/행동 노드를 BT XML에서 사용할 수 있습니다.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.02
    # 일시적인 TF 누락이 생겨도 즉시 recovery 동작으로 넘어가지 않는 시간(초)입니다.
    failure_tolerance: 1.0
    odom_topic: /go2/odom
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      # 위치 이동뿐 아니라 제자리 회전도 주행 진행으로 인정합니다.
      # 목표 방향을 맞추는 중 작은 회전도 진행으로 기록합니다.
      plugin: nav2_controller::PoseProgressChecker
      required_movement_radius: 0.10
      required_movement_angle: 0.05
      movement_time_allowance: 30.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      # 실외 주행의 localization 오차를 고려한 목표 위치 허용 오차입니다.
      xy_goal_tolerance: 0.25
      # 목표 방향 허용 오차입니다. 약 11.5도입니다.
      yaw_goal_tolerance: 0.20
    FollowPath:
      # MPPI는 회전, 전진, 작은 후진 후보를 동시에 평가합니다. DWB의
      # RotateToGoal 단계 전환에 의존하지 않으므로 180도 반대 방향 목표와
      # 목표점 최종 yaw 정렬에서 후보가 모두 탈락하는 문제를 줄입니다.
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 40
      model_dt: 0.05
      batch_size: 1000
      iteration_count: 1
      vx_std: 0.20
      vy_std: 0.08
      wz_std: 0.25
      # Go2 cmd_vel bridge 및 velocity_smoother의 한계와 일치시킨다.
      vx_max: 0.35
      vx_min: -0.10
      vy_max: 0.15
      wz_max: 0.35
      ax_max: 0.8
      ax_min: -0.8
      ay_max: 0.4
      ay_min: -0.4
      az_max: 0.4
      prune_distance: 1.7
      transform_tolerance: 0.6
      temperature: 0.3
      gamma: 0.015
      motion_model: Omni
      visualize: false
      regenerate_noises: true
      critics: [ConstraintCritic, ObstaclesCritic, GoalCritic, GoalAngleCritic, PathAlignCritic, PathFollowCritic, PathAngleCritic, PreferForwardCritic, VelocityDeadbandCritic]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 2.0
        critical_weight: 30.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.08
        near_goal_distance: 0.7
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      # Go2 bridge는 |angular.z| < 0.01을 0으로 바꾸고, 실제 보행도 수 mrad/s
      # 명령에는 반응하지 않는다. MPPI가 0.003 rad/s 같은 물리적으로 무효한
      # 회전 명령을 선택하지 않도록 회전 deadband를 DWB의 기존 최소속도와 맞춘다.
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.0, 0.0, 0.08]

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 8.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      # map -> odom TF의 AMCL 갱신 지연을 허용합니다.
      transform_tolerance: 0.8
      # 머리와 다리의 회전 sweep을 고려한 Go2 외곽선이다. 원형 반경 0.28 m보다
      # 앞뒤가 긴 실제 형상을 반영해 제자리 회전 충돌 판정을 보수적으로 만든다.
      footprint: "[[0.43, 0.24], [0.43, -0.24], [-0.37, -0.24], [-0.37, 0.24]]"
      footprint_padding: 0.02
      always_send_full_costmap: true
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 5.0
          raytrace_min_range: 0.05
          obstacle_max_range: 4.5
          obstacle_min_range: 0.05
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 4.0
        inflation_radius: 0.45

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.43, 0.24], [0.43, -0.24], [-0.37, -0.24], [-0.37, 0.24]]"
      footprint_padding: 0.02
      resolution: 0.05
      # map -> odom TF의 AMCL 갱신 지연을 허용합니다.
      transform_tolerance: 0.8
      track_unknown_space: true
      rolling_window: false
      always_send_full_costmap: true
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 6.0
          raytrace_min_range: 0.05
          obstacle_max_range: 5.0
          obstacle_min_range: 0.05
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 4.0
        inflation_radius: 0.50

map_server:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # map_server가 읽을 지도 YAML 경로입니다.
    # 런치의 map 인자가 이 값을 덮어쓰므로 기본값은 빈 문자열로 둡니다.
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: true
      allow_unknown: false

smoother_server:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # 사용할 경로 smoother 이름 목록입니다.
    # 아래 simple_smoother 설정과 이름이 일치해야 합니다.
    smoother_plugins: [simple_smoother]

    simple_smoother:
      # 경로를 부드럽게 만드는 smoother 구현입니다.
      # SimpleSmoother는 경로의 급격한 방향 변화를 줄입니다.
      plugin: nav2_smoother::SimpleSmoother

      # smoothing 종료 판단 오차입니다.
      # 값을 낮추면 더 정밀하게 수렴하지만 반복 계산이 늘어납니다.
      tolerance: 1.0e-10

      # smoothing 최대 반복 횟수입니다.
      # 값을 키우면 더 많이 보정하지만 처리 시간이 증가합니다.
      max_its: 1000

      # 보정 결과를 다시 세밀하게 다듬을지 결정합니다.
      # true이면 경로가 더 부드러워질 수 있지만 계산량이 증가합니다.
      do_refinement: true

behavior_server:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # Local costmap raw 토픽입니다.
    # behavior가 주변 장애물 정보를 확인하는 데 사용합니다.
    local_costmap_topic: local_costmap/costmap_raw

    # Global costmap raw 토픽입니다.
    # behavior가 전역 장애물 정보를 확인하는 데 사용합니다.
    global_costmap_topic: global_costmap/costmap_raw

    # Local footprint 토픽입니다.
    # 회전과 후진 behavior의 로봇 외곽선 계산에 사용됩니다.
    local_footprint_topic: local_costmap/published_footprint

    # Global footprint 토픽입니다.
    # 전역 기준 behavior의 로봇 외곽선 계산에 사용됩니다.
    global_footprint_topic: global_costmap/published_footprint

    # Behavior 실행 주기(Hz)입니다.
    # 값을 키우면 회전/후진/대기의 상태 반응이 빨라집니다.
    cycle_frequency: 10.0

    # 사용할 behavior 목록입니다.
    # 목록 이름은 아래 각 behavior 설정 키와 일치해야 합니다.
    behavior_plugins: [spin, backup, drive_on_heading, wait]

    spin:
      # 제자리 회전 behavior 구현입니다.
      # Nav2의 회복 동작과 Spin action에 사용됩니다.
      plugin: nav2_behaviors/Spin

    backup:
      # 후진 behavior 구현입니다.
      # 장애물 회피 회복 동작과 BackUp action에 사용됩니다.
      plugin: nav2_behaviors/BackUp

    drive_on_heading:
      # 지정 방향으로 주행하는 behavior 구현입니다.
      # Recovery 또는 BT의 DriveOnHeading action에 사용됩니다.
      plugin: nav2_behaviors/DriveOnHeading

    wait:
      # 대기 behavior 구현입니다.
      # 장애물이나 BT 조건을 기다리는 동작에 사용됩니다.
      plugin: nav2_behaviors/Wait

    # Behavior가 사용하는 전역 기준 프레임입니다.
    # 현재 로봇 주행 기준인 odom과 일치시킵니다.
    global_frame: odom

    # Behavior가 사용하는 로봇 기준 프레임입니다.
    # TF의 base_link와 일치해야 회복 동작이 맞습니다.
    robot_base_frame: base_link

    # Behavior TF를 기다릴 최대 시간(초)입니다.
    # 값을 키우면 TF 지연에 강해지지만 동작 반응이 늦어집니다.
    transform_tolerance: 0.3

    # Behavior가 미래 상태를 시뮬레이션할 시간(초)입니다.
    # 값을 키우면 회복 동작을 더 먼 미래까지 검토합니다.
    simulate_ahead_time: 2.0

    # 최대 회전 속도(rad/s)입니다.
    # MPPI의 회전 상한과 맞춰 recovery 회전도 같은 수준으로 제한합니다.
    max_rotational_vel: 0.35

    # 최소 회전 속도(rad/s)입니다.
    # 값을 높이면 너무 느린 회전이 제거되어 정지 떨림을 줄일 수 있습니다.
    min_rotational_vel: 0.10

    # 회전 가속도 제한(rad/s²)입니다.
    # 값을 낮추면 회복 회전의 시작과 정지가 부드러워집니다.
    rotational_acc_lim: 0.4

waypoint_follower:
  ros__parameters:
    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # 실제 로봇에서는 false, 시뮬레이터에서는 true로 설정합니다.
    use_sim_time: false

    # Waypoint 처리 주기(Hz)입니다.
    # 값을 키우면 waypoint 상태 확인이 빨라집니다.
    loop_rate: 20

    # 하나의 waypoint 실패 시 전체 작업을 중단할지 결정합니다.
    # 정확도 시험에서는 실패한 지점을 넘기지 않고 즉시 중단합니다.
    stop_on_failure: true

    # waypoint 도착 후 실행할 task executor 이름입니다.
    # 아래 wait_at_waypoint 설정의 키와 일치해야 합니다.
    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      # waypoint 대기 executor 구현입니다.
      # 도착 후 지정 시간 동안 정지하는 동작을 제공합니다.
      plugin: nav2_waypoint_follower::WaitAtWaypoint

      # waypoint 도착 대기를 활성화할지 결정합니다.
      # false이면 waypoint 도착 후 대기하지 않습니다.
      enabled: true

      # waypoint 도착 후 대기할 시간(ms)입니다.
      # 값을 줄이면 다음 waypoint로 더 빨리 이동합니다.
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.35, 0.15, 0.35]
    min_velocity: [-0.1, -0.15, -0.35]
    max_accel: [0.8, 0.4, 0.4]
    max_decel: [-0.8, -0.4, -0.4]
    odom_topic: /go2/odom
    odom_duration: 0.1
    # Go2가 실제로 회전하지 않는 미세 yaw 명령을 외부로 보내지 않는다.
    # MPPI의 VelocityDeadbandCritic과 같은 값으로 유지한다.
    deadband_velocity: [0.0, 0.0, 0.08]
    velocity_timeout: 1.0

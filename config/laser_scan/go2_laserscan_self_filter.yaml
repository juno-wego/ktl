go2_laser_scan_self_filter:
  ros__parameters:
    # Nav2 costmap footprint와 동일한 Go2 body/leg 회전 외곽선이다.
    # 이 사각형 안에서 끝나는 scan ray만 제거한다. 따라서 로봇 바로 바깥의
    # 실제 장애물은 유지하면서 로봇 몸체 반사만 costmap에서 제외할 수 있다.
    min_x: -0.37
    max_x: 0.43
    min_y: -0.24
    max_y: 0.24
    padding: 0.02
    use_sim_time: false

go2_pointcloud_to_laserscan:
  ros__parameters:
    # 포인트를 변환해 출력할 기준 TF 프레임입니다.
    # base_link 기준으로 바꾸면 로봇 중심 기준 높이 필터가 적용됩니다.
    target_frame: base_link

    # TF를 기다릴 최대 시간(초)입니다.
    # 값을 키우면 늦게 도착한 TF를 더 기다리지만 지연도 증가합니다.
    transform_tolerance: 0.1

    # 포인트를 사용할 최소 높이(m)입니다.
    # 센서 기준 지면(-0.15 m)과 로봇 하체 반사를 제외합니다.
    # 값을 더 높이면 낮은 장애물도 함께 제외되므로 -0.05 m를 기준으로 둡니다.
    min_height: -0.05

    # 포인트를 사용할 최대 높이(m)입니다.
    # 값을 낮추면 로봇 상부나 높은 장애물 포인트를 LaserScan에서 제외합니다.
    max_height: 0.45

    # 스캔의 최소 각도(rad)입니다.
    # 값을 좁히면 로봇 주변의 특정 방향만 LaserScan에 포함됩니다.
    angle_min: -3.141592

    # 스캔의 최대 각도(rad)입니다.
    # angle_min과 함께 수정해 전방 또는 일부 시야만 사용하도록 할 수 있습니다.
    angle_max: 3.141592

    # 인접한 LaserScan 빔 사이의 각도 간격(rad)입니다.
    # 값을 작게 하면 해상도는 높아지지만 CPU와 메시지 크기가 증가합니다.
    angle_increment: 0.0087

    # LaserScan 한 바퀴의 기준 시간(초)입니다.
    # LiDAR 회전 주기와 맞추면 장애물 위치와 timestamp가 더 자연스럽습니다.
    scan_time: 0.1

    # 유효한 거리로 인정할 최소 범위(m)입니다.
    # 값을 키우면 센서 바로 앞의 포인트가 장애물로 사용되지 않습니다.
    # Go2 몸체·다리 반사와 로봇 footprint 안쪽을 제외합니다.
    range_min: 0.50

    # 유효한 거리로 인정할 최대 범위(m)입니다.
    # 값을 줄이면 먼 거리의 포인트를 무시해 Nav2와 SLAM의 부담을 줄입니다.
    range_max: 20.0

    # 측정되지 않은 빔을 무한 거리로 채울지 결정합니다.
    # true이면 빈 공간을 장애물 없음으로 표현하고, false이면 빈 빔이 제외됩니다.
    use_inf: true

    # 무한 거리로 처리할 때 사용하는 여유 거리(m)입니다.
    # use_inf 동작의 경계값을 조정하며 일반적으로 기본값을 유지합니다.
    inf_epsilon: 1.0

    # ROS 2 시뮬레이션 시간을 사용할지 결정합니다.
    # true이면 /clock을 사용하고, 실제 로봇 운용에서는 false를 사용합니다.
    use_sim_time: false
